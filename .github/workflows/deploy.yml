name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "pages-blog"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-blog
      url: https://gabriel.axm-protocols.io
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

      # Create the Pages project on first run (no-op if it already exists), so
      # `pages deploy` never fails with "project not found".
      - name: Ensure Pages project exists
        run: |
          npx --yes wrangler@4 pages project create blog \
            --production-branch=main 2>/dev/null \
            || echo "project 'blog' already exists, continuing"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=blog --branch=main
